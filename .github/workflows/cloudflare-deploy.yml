name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy MoonTVPlus to Cloudflare

    env:
      BUILD_TARGET: cloudflare
      NODE_ENV: production
      NEXT_PUBLIC_STORAGE_TYPE: ${{ secrets.NEXT_PUBLIC_STORAGE_TYPE }}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      UPSTASH_URL: ${{ secrets.UPSTASH_URL }}
      UPSTASH_TOKEN: ${{ secrets.UPSTASH_TOKEN }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      TMDB_PROXY: ${{ secrets.TMDB_PROXY }}
      TMDB_REVERSE_PROXY: ${{ secrets.TMDB_REVERSE_PROXY }}
      SITE_BASE: ${{ secrets.SITE_BASE }}
      CRON_PASSWORD: ${{ secrets.CRON_PASSWORD }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build for Cloudflare
        run: pnpm build:cloudflare

      - name: Install Wrangler
        run: pnpm add -g wrangler@4.60.0

      - name: Deploy to Cloudflare Workers
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
